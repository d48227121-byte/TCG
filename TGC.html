<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeD Creative Studio | TM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-color: #0a0a0a;
            --header-bg: #ffffff;
            --text-header: #000000;
            --card-bg: #1a1a1a;
            --font-main: 'Inter', sans-serif;
            /* COLORI RARITÀ */
            --color-c: #aaaaaa;  
            --color-nc: #169e1d; 
            --color-r: #2054ff;  
            --color-sr: #a632fa;
            --color-ssr: #faed32;
            
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* Impedisce che appaia il cursore di testo ovunque cliccando */
            user-select: none;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--header-bg);
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .logo-box {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10;
            cursor: pointer;
        }

        .panda-chopper {
            position: absolute;
            width: 180px;
            right: 0;
            bottom: -5px;
            z-index: -1;
            opacity: 0;
            transform: translate(0, 0) scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-box:hover .panda-chopper {
            opacity: 1;
            transform: translate(120px, 20px) scale(1) rotate(15deg);
        }

        .logo-personalizzato { height: 100px; width: auto; display: block; }

        h1 {
            font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin: 0;
            color: var(--text-header);
            line-height: 0.85;
        }

        /* --- SWIPER SLIDER --- */
        .swiper {
            width: 100%;
            height: 450px;
            border-bottom: 2px solid #222;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active {
            background: var(--color-sr) !important;
            opacity: 1;
            width: 25px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        /* --- NAVBAR --- */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: transparent;
            color: #777;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            padding: 10px 0;
            border-bottom: 2px solid transparent;
            outline: none; /* Rimuove bordo focus */
        }

        .nav-btn.active {
            color: white;
            border-bottom: 2px solid var(--color-sr);
        }

        .nav-btn:hover { color: white; }

        /* --- CONTENUTI --- */
        .container { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Griglia Carte */
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .set-card {
            background: #151515; border: 1px solid #333; border-radius: 12px; padding: 60px 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .set-card:hover { border-color: var(--color-sr); transform: translateY(-5px); }

        /* Info Carta */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
        }

        .card-name { font-weight: 700; letter-spacing: 1px; }
        
        .rarity-badge {
            font-weight: 900;
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid currentColor;
        }

        /* --- GRIGLIA VIDEO --- */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; 
        }

        .video-item { 
            background: #151515; border-radius: 15px; overflow: hidden; border: 1px solid #333;
            transition: 0.3s ease;
            position: relative;
        }

        .video-item:hover { border-color: var(--color-sr); transform: translateY(-5px); }
        
        .video-item video { 
            width: 100%; 
            aspect-ratio: 9/16;
            display: block; 
            background: #000; 
            object-fit: cover;
            cursor: pointer;
        }
        
        .video-info { padding: 15px; text-align: center; }
        .video-info h3 { margin: 0; font-size: 1rem; text-transform: uppercase; color: white; }

        .btn-back {
            background: white; color: black; border: none; padding: 12px 25px;
            font-weight: 900; cursor: pointer; display: none; margin-bottom: 20px;
            text-transform: uppercase;
            outline: none;
        }

        @media (max-width: 900px) {
            .logo-box { position: static; transform: none; margin-bottom: 20px; }
            .panda-chopper { display: none; }
            .swiper { height: 250px; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo-box">
            <img src="Panda Chopper.png" alt="Panda" class="panda-chopper">
            <img src="LOGO - DeD.svg" alt="Logo" class="logo-personalizzato">
        </div>
        <h1 id="mainTitle">DeD<br>Creative Studio</h1>
    </header>

    <div id="heroSlider" class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="BanneR/Banner1.jpg" alt="Slide 1"></div>
            <div class="swiper-slide"><img src="BanneR/Banner2.jpg" alt="Slide 2"></div>
            <div class="swiper-slide"><img src="BanneR/Banner3.jpg" alt="Slide 3"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <nav class="main-nav">
        <button class="nav-btn active" onclick="switchSection('cards', this)">Carte</button>
        <button class="nav-btn" onclick="switchSection('videos', this)">Video</button>
        <button class="nav-btn" disabled>Coming Soon</button>
    </nav>

    <div class="container">
        <div id="cards-section" class="content-section active">
            <button class="btn-back" id="backBtn" onclick="renderSets()">← Torna ai Set</button>
            <div class="album-grid" id="mainGrid"></div>
        </div>

        <div id="videos-section" class="content-section">
            <div class="video-grid">
                
                <div class="video-item">
                    <video loop muted playsinline preload="metadata" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime = 0;">
                        <source src="ViDeO/HxH.mp4" type="video/mp4">
                    </video>
                    <div class="video-info"><h3>Hunter x Hunter</h3></div>
                </div>

                <div class="video-item">
                    <video loop muted playsinline preload="metadata" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime = 0;">
                        <source src="ViDeO/Arcane.mp4" type="video/mp4">
                    </video>
                    <div class="video-info"><h3>Arcane</h3></div>
                </div>

                <div class="video-item">
                    <video loop muted playsinline preload="metadata" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime = 0;">

                    </video>
                    <div class="video-info"><h3>Invincible</h3></div>
                </div>

                <div class="video-item">
                    <video loop muted playsinline preload="metadata" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime = 0;">
                        <source src="ViDeO/Ben10.mp4" type="video/mp4">
                    </video>
                    <div class="video-info"><h3>Ben 10</h3></div>
                </div>

            </div>
        </div>
    </div>

        function getRarityColor(rarity) {
            const r = rarity.toUpperCase();
            if (r === 'C') return 'var(--color-c)';
            if (r === 'NC') return 'var(--color-nc)';
            if (r === 'R') return 'var(--color-r)';
            if (r === 'SR') return 'var(--color-sr)';
            if (r === 'SSR') return 'var(--color-ssr)';
            return '#fff';
        }

        const swiper = new Swiper('.swiper', {
            loop: true,
            speed: 1000,
            autoplay: { delay: 3500, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true },
            grabCursor: true

        function switchSection(sectionId, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId + '-section').classList.add('active');

        const grid = document.getElementById('mainGrid');
        const backBtn = document.getElementById('backBtn');
        const headerTitle = document.getElementById('mainTitle');
        const sliderEl = document.getElementById('heroSlider');

        function renderSets() {
            backBtn.style.display = 'none';
            sliderEl.style.display = 'block';
            headerTitle.innerHTML = NOME_SITO;
            grid.innerHTML = Object.keys(database).map(key => `
                <div class="set-card" onclick="renderCards('${key}')">
                    <h2 style="text-transform: uppercase;">${database[key].titolo}</h2>
                    <p>${database[key].carte.length} CARTE</p>
                </div>
            `).join('');
            document.activeElement.blur();
        }

        function renderCards(setKey) {
            const set = database[setKey];
            backBtn.style.display = 'block';
            sliderEl.style.display = 'none';
            headerTitle.innerText = set.titolo;
            
            grid.innerHTML = set.carte.map(c => {
                const color = getRarityColor(c.rarita);
                return `
                <div style="background:var(--card-bg); padding:12px; border-radius:12px; border:1px solid #333;">
                    <img src="${c.immagine}" style="width:100%; border-radius:8px;" onerror="this.src='https://via.placeholder.com/250x350?text=Manca+Immagine'">
                    <div class="card-footer">
                        <span class="card-name">${c.nome}</span>
                        <div class="rarity-badge" style="color:${color};">
                            <span>${c.rarita}</span>
                        </div>
                    </div>
                </div>
            `}).join('');
            window.scrollTo(0,0);
            document.activeElement.blur();
        }

        renderSets();
    </script>
</body>
</html>
