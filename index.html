<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeD Creative Studio | TM</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-color: #050505;
            --header-bg: #ffffff;
            --text-header: #000000;
            --card-bg: #121212;
            --font-main: 'Inter', sans-serif;
            --color-c: #888888;  
            --color-nc: #2ecc71; 
            --color-r: #3498db;  
            --color-sr: #9b59b6;
            --color-ssr: #f1c40f;
            --accent: #6200ea;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: var(--font-main);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--header-bg);
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo-box {
            position: absolute; top: 50%; left: 5%; transform: translateY(-50%);
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 11; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-box:hover { transform: translateY(-55%) scale(1.05); }

        .panda-chopper {
            position: absolute; width: 140px; right: 20px; bottom: -20px;
            z-index: -1; opacity: 0; transform: scale(0.5);
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .logo-box:hover .panda-chopper {
            opacity: 1; transform: translate(100px, -10px) scale(1) rotate(10deg);
        }

        .logo-personalizzato { height: 80px; width: auto; display: block; }

        h1 {
            font-weight: 900; font-size: clamp(2rem, 10vw, 5rem);
            text-align: center; text-transform: uppercase; letter-spacing: -4px;
            margin: 0; color: var(--text-header); line-height: 0.8;
        }

        /* --- SWIPER & PALLINI --- */
        .swiper { width: 100%; height: 500px; position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        .swiper-pagination-bullet { 
            background: #fff !important; 
            opacity: 0.5; 
            transition: all 0.3s;
        }
        .swiper-pagination-bullet-active {
            background: var(--color-sr) !important;
            opacity: 1;
            width: 30px;
            border-radius: 5px;
        }

        /* --- NAVBAR --- */
        .main-nav {
            display: flex; justify-content: center; gap: 30px; padding: 15px;
            background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100;
        }

        .nav-btn {
            background: transparent; color: #555; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 1rem;
            transition: 0.3s; padding: 10px 20px; border-radius: 8px;
        }

        .nav-btn.active { color: white; background: rgba(255,255,255,0.05); border-bottom: 2px solid var(--color-sr); }
        .nav-btn:hover:not(.active) { color: #aaa; }

        /* --- CONTENUTI --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRID SET & CARDS --- */
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .set-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            border: 1px solid #333; border-radius: 20px; padding: 80px 30px;
            text-align: center; cursor: pointer; transition: 0.4s;
            position: relative; overflow: hidden;
            flex: 1 1 300px !important;
        }
        
        .set-card:hover { transform: translateY(-10px); border-color: var(--color-sr); box-shadow: 0 20px 40px rgba(166, 50, 250, 0.2); }

        .card-item {
            background: var(--card-bg); padding: 15px; border-radius: 18px; 
            border: 1px solid #222; transition: 0.4s;
        }
        .card-item:hover {
            transform: scale(1.03); border-color: #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .card-name { font-weight: 700; font-size: 0.9rem; color: #eee; }
        .rarity-badge { font-weight: 900; font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; border: 1px solid currentColor; background: rgba(0,0,0,0.3); }

    /* Layout per la sezione set */
        .sets-wrapper {display: flex !important; flex-direction: row !important; align-items: flex-start !important; gap: 50px !important; width: 100% !important; margin-top: 20px; }

    /* Colonna sinistra (Carta che gira) */
        .featured-side { flex: 0 0 350px !important; perspective: 1000px; position: sticky; top: 120px; }

    /* Colonna destra (I tuoi blocchi set) */
        .sets-side { flex: 1 !important; display: flex !important; flex-wrap: wrap !important; gap: 30px !important; /* Più spazio tra un blocco e l'altro */}

    /* Animazione carta rotante */
        .rotating-card { width: 350px; height: 490px; position: relative; transform-style: preserve-3d; animation: rotateAuto 10s infinite linear; }

        @keyframes rotateAuto { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .card-face-rot { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; overflow: hidden; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .card-back-rot { transform: rotateY(180deg); }
        .card-face-rot img { width: 100%; height: 100%; object-fit: cover; }

        /* Responsive per telefoni */
        @media (max-width: 900px) {
            .sets-wrapper { flex-direction: column !important; align-items: center !important; }
            .featured-side { position: static !important; margin-bottom: 30px; }
        }

        /* --- VIDEO --- */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .video-item { 
            background: #111; border-radius: 20px; overflow: hidden; 
            border: 1px solid #222; transition: 0.4s; position: relative; 
        }
        .video-item:hover { border-color: var(--color-sr); transform: translateY(-5px); }
        .video-item video { width: 100%; aspect-ratio: 9/16; object-fit: cover; cursor: pointer; display: block; }
        .video-info { padding: 20px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .video-info h3 { margin: 0; font-size: 1.2rem; font-weight: 900; }

        /* --- GRID GRAFICHE PC --- */
        .graphics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); /* Colonne larghe per il PC */
        gap: 25px;
        }

        .graphic-item {
        background: #121212;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #222;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .graphic-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .graphic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        /* Effetto Hover PC */
        .graphic-item:hover {
            border-color: var(--color-sr); /* Colore viola al passaggio */
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .graphic-item:hover img {
            transform: scale(1.1); /* Zoom dell'immagine */
        }

        .graphic-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .graphic-item:hover .graphic-info {
            opacity: 1;
        }

        .graphic-info h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .graphic-info p {
            margin: 5px 0 0;
            color: var(--color-sr);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* --- TAŠTO TORNA INDIETRO --- */
        .btn-back { 
            background: white; color: black; border: none; padding: 15px 30px; 
            font-weight: 900; cursor: pointer; display: none; margin-bottom: 30px; 
            border-radius: 50px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-back:hover { transform: translateX(-5px); background: #eee; }

        /* --- MODAL FLIP --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-content {
            display: flex; max-width: 1100px; width: 100%; gap: 40px; position: relative; background: transparent;
        }
        .modal-left { flex: 1; display: flex; align-items: center; justify-content: center; }
        
        .flip-card { background-color: transparent; width: 100%; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { width: 100%; backface-visibility: hidden; border-radius: 20px; }
        .flip-card-front img, .flip-card-back img { width: 100%; display: block; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .flip-card-back { position: absolute; top: 0; left: 0; height: 100%; transform: rotateY(180deg); }

        .modal-right { flex: 1.2; display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .modal-right h2 { font-size: 3.5rem; font-weight: 900; margin: 0 0 40px 0; color: #fff; letter-spacing: -2px; }
        .desc-label { font-size: 0.9rem; font-weight: 800; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .desc-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #222; min-height: 150px; }
        .desc { color: #eee; line-height: 1.6; font-size: 1.2rem; margin: 0; font-style: italic; }

        @media (max-width: 900px) {
            header { padding: 40px 20px; }
            .logo-box { position: relative; left: 0; transform: none; margin-bottom: 20px; }
            .panda-chopper { display: none; }
            .modal-content { flex-direction: column; gap: 20px; align-items: center; }
            .modal-right { padding: 40px 30px; text-align: center; }
            .modal-right h2 { font-size: 2rem; margin-bottom: 20px; }
            .swiper { height: 300px; }
        }
    </style>
</head>

        const grid = document.getElementById('mainGrid');
        const backBtn = document.getElementById('backBtn');
        const headerTitle = document.getElementById('mainTitle');
        const sliderEl = document.getElementById('heroSlider');

        function getRarityColor(rarity) {
            const r = rarity.toUpperCase();
            if (r === 'C') return 'var(--color-c)';
            if (r === 'NC') return 'var(--color-nc)';
            if (r === 'R') return 'var(--color-r)';
            if (r === 'SR') return 'var(--color-sr)';
            if (r === 'SSR') return 'var(--color-ssr)';
            return '#fff';
        }

        const swiper = new Swiper('.swiper', {
            loop: true, speed: 1200,
            autoplay: { delay: 4000, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true },
            effect: 'fade', fadeEffect: { crossFade: true }
        });

        function switchSection(sectionId, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId + '-section').classList.add('active');
            btn.classList.add('active');
            if(sectionId === 'cards') renderSets();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

function renderSets() {
    backBtn.style.display = 'none';
    sliderEl.style.display = 'block';
    headerTitle.innerHTML = NOME_SITO;
    
    // Reset del contenitore principale
    grid.style.display = 'block'; 

    grid.innerHTML = `
        <div class="sets-wrapper">
            
            <div class="featured-side">
                <div class="rotating-card">
                    <div class="card-face-rot">
                        <img src="CarD - Collection/Card Collection/37.png" onerror="this.src='https://via.placeholder.com/300x420?text=Card+Front'">
                    </div>
                    <div class="card-face-rot card-back-rot">
                        <img src="DORSO_CARTA.png" onerror="this.src='https://via.placeholder.com/300x420?text=Card+Back'">
                    </div>
                </div>
            </div>

            <div class="sets-side">
                ${Object.keys(database).map(key => `
                    <div class="set-card" onclick="renderCards('${key}')">
                        <h2 style="text-transform: uppercase; margin-bottom: 10px;">${database[key].titolo}</h2>
                        <p style="opacity:0.6; font-weight:700;">${database[key].carte.length} CARTE DISPONIBILI</p>
                    </div>
                `).join('')}
            </div>

        </div>
    `;
}

function renderCards(setKey) {
    const set = database[setKey];
    backBtn.style.display = 'inline-block';
    sliderEl.style.display = 'none';
    headerTitle.innerText = set.titolo;
    
    // Torna alla griglia normale per le miniature delle carte
    grid.style.display = 'grid'; 
    grid.className = "album-grid"; 

    grid.innerHTML = set.carte.map((c, index) => {
        const color = getRarityColor(c.rarita);
        return `
        <div class="card-item" onclick="apriAnteprima('${setKey}', ${index})">
            <img src="${c.immagine}" style="width:100%; border-radius:12px;" onerror="this.src='https://via.placeholder.com/250x350?text=Image+Missing'">
            <div class="card-footer">
                <span class="card-name">${c.nome}</span>
                <div class="rarity-badge" style="color:${color}; border-color:${color};">
                    <span>${c.rarita}</span>
                </div>
            </div>
        </div>
    `}).join('');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

        function toggleFlip() {
            document.getElementById('cardFlipper').classList.toggle('is-flipped');
        }

        function apriAnteprima(setKey, cardIndex) {
            currentSetOpen = setKey;
            currentCardIndex = cardIndex;

            const set = database[setKey];
            const carta = set.carte[cardIndex];

            document.getElementById('cardFlipper').classList.remove('is-flipped');
            document.getElementById('modalImg').src = carta.immagine;
            document.getElementById('modalRetroImg').src = set.dorso || "https://via.placeholder.com/450x600?text=Dorso+Assente";
            document.getElementById('modalNome').innerText = carta.titoloCard;
            document.getElementById('modalDesc').innerHTML = carta.desc || "<i>Nessuna descrizione disponibile per questa carta.</i>";
            document.getElementById('modalCarta').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function chiudiAnteprima(event) {
            if (event && event.stopPropagation) event.stopPropagation();
            document.getElementById('modalCarta').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => { if (e.key === "Escape") chiudiAnteprima(); });

        document.addEventListener('keydown', (e) => {
   
            if (document.getElementById('modalCarta').style.display !== 'flex') return;

            if (e.key === "Escape") {
                chiudiAnteprima();
        } 
        else if (e.key === "ArrowRight") {
        
            if (currentCardIndex < database[currentSetOpen].carte.length - 1) {
            apriAnteprima(currentSetOpen, currentCardIndex + 1);
        }
    } 
        else if (e.key === "ArrowLeft") {
        
        if (currentCardIndex > 0) {
            apriAnteprima(currentSetOpen, currentCardIndex - 1);
        }
    }
});
        renderSets();
    </script>
